name: Build and upload to PyPI

on:
  push:
    tags:
      - '*'
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build_wheels:
    name: Build wheels on ${{ matrix.os }} ${{ matrix.arch }} (abi3)
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          # Linux x86_64 - single abi3 wheel for all Python 3.10+
          - os: ubuntu-latest
            arch: auto
            platform-id: manylinux_x86_64

          # Linux aarch64 - single abi3 wheel for all Python 3.10+
          - os: ubuntu-22.04-arm
            arch: aarch64
            platform-id: manylinux_aarch64

          # macOS x86_64 - single abi3 wheel for all Python 3.10+
          - os: macos-15-intel
            arch: x86_64
            platform-id: macosx_x86_64

          # macOS arm64 - single abi3 wheel for all Python 3.10+
          - os: macos-14
            arch: arm64
            platform-id: macosx_arm64

          # Windows AMD64 - single abi3 wheel for all Python 3.10+
          - os: windows-2022
            arch: AMD64
            platform-id: win_amd64

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          submodules: recursive
      
      - name: Add msbuild to PATH
        if: ${{ matrix.os == 'windows-latest'}}
        uses: microsoft/setup-msbuild@v2
        with:
          vs-version: '[17.13,17.14)'

      - name: Build wheels
        uses: pypa/cibuildwheel@v3.4.0
        env:
          VERSIONEER_CLOSEST_TAG_ONLY: 1
          CIBW_SKIP: pp* *i686
          CIBW_ARCHS: ${{ matrix.arch }}
          # Build only cp310 for abi3 wheel (compatible with all Python 3.10+)
          CIBW_BUILD: cp310-*
          CIBW_TEST_REQUIRES: pytest requests pytest-asyncio pytest-timeout
          CIBW_MANYLINUX_IMAGE: manylinux2014
          CIBW_REPAIR_WHEEL_COMMAND_LINUX: >-
            auditwheel show {wheel} &&
            auditwheel repair
            --exclude libstdc++.so.6
            --exclude libgomp.so.1
            -w {dest_dir} {wheel}
          CIBW_BEFORE_ALL_LINUX: >-
            curl --proto '=https' --tlsv1.2 -sSf https://sh.rustup.rs | sh -s -- -y &&
            source $HOME/.cargo/env
          CIBW_BEFORE_BUILD: >-
            pip install -r requirements.txt && make &&
            echo "=== lddtree on final .so ===" &&
            find build/ -name '*.so' -exec lddtree {} \; 2>/dev/null || true &&
            echo "=== readelf dynamic needed on final .so ===" &&
            find build/ -name '*.so' -exec sh -c 'echo "--- {} ---"; readelf -d "{}" 2>/dev/null | grep NEEDED' \; 2>/dev/null || true &&
            echo "=== check all system .so versions ===" &&
            find build/ -name '*.so' -exec sh -c 'for dep in $(ldd "{}" 2>/dev/null | awk "/=>/{print \$3}"); do echo "  $dep:"; readelf -V "$dep" 2>/dev/null | grep -E "Name: (GLIBC|GLIBCXX|CXXABI)" | sort -u; done' \; 2>/dev/null || true &&
            echo "=== gcc and libstdc++ version ===" &&
            gcc --version 2>/dev/null || true &&
            ls -la /opt/rh/gcc-toolset-*/root/usr/lib/gcc/x86_64-redhat-linux/*/ 2>/dev/null || true &&
            find / -name 'libstdc++.so.6' 2>/dev/null | head -5 || true &&
            for f in $(find / -name 'libstdc++.so.6' 2>/dev/null | head -5); do echo "--- $f ---"; readelf -V "$f" 2>/dev/null | grep -E "Name: (GLIBCXX|CXXABI)" | sort -u; done || true
          CIBW_BUILD_VERBOSITY: 1
          CIBW_ENVIRONMENT_LINUX: "PATH=$HOME/.cargo/bin:$PATH XLLAMACPP_BUILD_AARCH64=${{ matrix.arch == 'aarch64' && '1' || '' }}"
          CIBW_ENVIRONMENT_MACOS: "XLLAMACPP_BUILD_AARCH64=${{ matrix.arch == 'aarch64' && '1' || '' }}"
          CIBW_ENVIRONMENT_WINDOWS: "XLLAMACPP_BUILD_AARCH64=${{ matrix.arch == 'aarch64' && '1' || '' }}"
        with:
          package-dir: ./

      - uses: actions/upload-artifact@v4
        with:
          name: wheel-abi3-${{ matrix.platform-id }}
          path: wheelhouse/*.whl

  build_sdist:
    name: Build source distribution
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          submodules: recursive

      - name: Build sdist
        run: pipx run build --sdist

      - uses: actions/upload-artifact@v4
        with:
          name: artifacts
          path: ./dist/*.tar.gz

  upload_pypi:
    needs: [build_wheels, build_sdist]
    runs-on: ubuntu-latest
    # upload to PyPI on every tag starting with 'v'
    if: github.event_name == 'push' && startsWith(github.ref, 'refs/tags/v')
    steps:
      - uses: actions/download-artifact@v4
        with:
          path: dist
          pattern: 'wheel-*'
          merge-multiple: true

      - uses: actions/download-artifact@v4
        with:
          path: dist
          name: artifacts

      - name: Publish to PyPI
        if: github.repository == 'xorbitsai/xllamacpp'
        uses: pypa/gh-action-pypi-publish@v1.12.4
        with:
          user: __token__
          password: ${{ secrets.PYPI_PASSWORD }}

      - name: Publish to Test PyPI
        if: github.repository != 'xorbitsai/xllamacpp'
        uses: pypa/gh-action-pypi-publish@v1.12.4
        with:
          user: __token__
          password: ${{ secrets.TEST_PYPI_PASSWORD }}
          verbose: true
          repository_url: https://test.pypi.org/legacy/
